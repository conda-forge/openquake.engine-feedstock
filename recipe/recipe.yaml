schema_version: 1

context:
  python_min: '3.11'
  version: 3.25.1

package:
  name: openquake.engine
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/openquake.engine/openquake_engine-${{ version }}.tar.gz
  sha256: 5549a2fee88fec0339e8980b9bdeee266762ba0f15e69866128deee405ae52f4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - oq = openquake.commands.__main__:oq

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=69.0
    - pip
  run:
    - python >=${{ python_min }}
    - setuptools
    - h5py >=2.10
    - numpy >=1.20
    - numba >=0.58
    - scipy >=1.3
    - pandas >=0.25
    - pyzmq >=19.0
    - psutil >=2.0
    - shapely >=1.7
    - docutils >=0.11
    - decorator >=4.3
    - django >=4.2,<5
    - matplotlib-base
    - requests >=2.20
    - toml >=0.10.2
    - pyproj >=1.9
    - alpha-shapes >=1.1.0
    - h3-py >=3.7
    # not listed in the metadata but required
    - fiona >=1.9.5

tests:
  - python:
      imports:
        - openquake._unc
        - openquake._unc.processing
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - oq --help

about:
  summary: Computes earthquake hazard and risk.
  license: AGPL-3.0-only
  license_file:
    - LICENSE
  homepage: https://github.com/gem/oq-engine

extra:
  recipe-maintainers:
    - cbworden
    - emthompson-usgs
    - mhearne-usgs
    - ocefpaf
